<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ログインページ</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            text-align: center;
        }

        .container {
            background: white;
            padding: 30px;
            margin: 50px auto;
            width: 400px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .form-row {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 10px 0;
        }

        .form-row label {
            width: 100px;
            text-align: right;
            margin-right: 10px;
        }

        .form-row input {
            width: 200px;
            padding: 8px;
        }

        button {
            padding: 10px 20px;
            background-color: #0078d4;
            color: white;
            border: none;
            cursor: pointer;
            margin-top: 15px;
        }

        button:hover {
            background-color: #005a9e;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>こんにちは、世界！</h1>
    <p>これは私の最初のHTMLページです。</p>

    <div class="form-row">
        <label>ユーザー名：</label>
        <input type="text" placeholder="ユーザー名">
    </div>

    <div class="form-row">
        <label>パスワード：</label>
        <input type="password" placeholder="パスワード">
    </div>

    <button onclick="location.href='nextdy>
</html>
