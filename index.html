<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>私の初めてのWebページ</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            text-align: center;
        }

        .container {
            background: white;
            padding: 30px;
            margin: 50px auto;
            width: 400px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
        }

        button {
            padding: 10px 20px;
            background-color: #0078d4;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: #005a9e;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>こんにちは、世界！</h1>
    <p>これは私の最初のHTMLページです。</p>

    <ul style="text-align:left;">
        <li>HTMLは簡単！</li>
        <li>楽しい！</li>
        <li>すぐに覚えられる！</li>
    </ul>

    <p>ユーザー名：</p>
    <input type="text" placeholder="ユーザー名を入力">

    <p>パスワード：</p>
    <input type="password" placeholder="パスワードを入力">

    <br><br>

    <button onclick="alert('ログインしました！')">ログイン</button>

    <br><br>

    <div>
        ここはdivタグで囲まれたセクションです。
    </div>

</div>

</body>
</html>
